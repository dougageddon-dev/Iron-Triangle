<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pick Two</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cheap: #f5c500;
    --fast: #00c8ff;
    --quality: #ff0066;
  }

  [data-theme="dark"] {
    --bg: #1c2128;
    --surface: #242b33;
    --surface-border: #2e3740;
    --text: #ffffff;
    --subtext: #999;
    --muted: #5a6880;
    --btn-idle-color: #aaa;
    --btn-idle-border: #4a5568;
    --blob-opacity: 0.45;
    --h1-from: #ffffff;
    --h1-to: #777;
    --toggle-bg: #242b33;
    --toggle-border: #3a4455;
    --toggle-knob: #fff;
    --toggle-track-active: #fff;
    --toggle-icon-moon: visible;
    --toggle-icon-sun: hidden;
  }

  [data-theme="light"] {
    --bg: #f5f2ed;
    --surface: #ffffff;
    --surface-border: #ddd;
    --text: #0a0a0a;
    --subtext: #666;
    --muted: #999;
    --btn-idle-color: #444;
    --btn-idle-border: #bbb;
    --blob-opacity: 0.18;
    --h1-from: #0a0a0a;
    --h1-to: #555;
    --toggle-bg: #e0ddd8;
    --toggle-border: #ccc;
    --toggle-knob: #0a0a0a;
    --toggle-track-active: #0a0a0a;
    --toggle-icon-moon: hidden;
    --toggle-icon-sun: visible;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    transition: background 0.4s ease, color 0.4s ease;
  }

  .bg-glow {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0;
    filter: blur(80px);
    transition: opacity 0.8s ease, background 0.8s ease;
  }
  .bg-glow.visible {
    opacity: var(--blob-opacity);
  }

  /* Theme toggle */
  .theme-toggle {
    position: fixed;
    top: 1.5rem;
    right: 1.5rem;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    background: var(--toggle-bg);
    border: 1px solid var(--toggle-border);
    border-radius: 99px;
    padding: 0.35rem 0.7rem;
    transition: background 0.4s ease, border-color 0.4s ease;
    user-select: none;
  }

  .theme-toggle svg {
    width: 14px; height: 14px;
    fill: var(--subtext);
    transition: fill 0.3s ease, opacity 0.3s ease;
    flex-shrink: 0;
  }

  .track {
    width: 32px; height: 18px;
    background: var(--toggle-border);
    border-radius: 99px;
    position: relative;
    transition: background 0.3s ease;
    flex-shrink: 0;
  }

  .knob {
    position: absolute;
    width: 12px; height: 12px;
    background: var(--toggle-knob);
    border-radius: 50%;
    top: 3px; left: 3px;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), background 0.3s ease;
  }

  [data-theme="light"] .knob { transform: translateX(14px); }

  .container {
    text-align: center;
    z-index: 1;
    padding: 2rem;
  }

  .eyebrow {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
    transition: color 0.4s ease;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4rem, 12vw, 9rem);
    line-height: 0.9;
    letter-spacing: 0.02em;
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, var(--h1-from) 0%, var(--h1-to) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    transition: background 0.4s ease;
  }

  .subtitle {
    font-size: 0.85rem;
    color: var(--subtext);
    margin-bottom: 3.5rem;
    font-weight: 300;
    transition: color 0.4s ease;
  }

  .buttons {
    display: flex;
    gap: 1.2rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 3rem;
  }

  .btn {
    position: relative;
    padding: 1.1rem 2.4rem;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    border: 2px solid var(--btn-idle-border);
    background: transparent;
    color: var(--btn-idle-color);
    border-radius: 99px;
    transition: border-color 0.25s ease, color 0.25s ease, box-shadow 0.25s ease,
                transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                background 0.4s ease;
    user-select: none;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.25s ease;
  }

  .btn span { position: relative; z-index: 1; }

  .btn.cheap   { --accent: var(--cheap); }
  .btn.fast    { --accent: var(--fast); }
  .btn.quality { --accent: var(--quality); }

  .btn:hover {
    border-color: var(--accent);
    color: var(--text);
    transform: translateY(-3px) scale(1.03);
  }

  .btn.active {
    border-color: var(--accent);
    color: #fff;
    transform: translateY(-4px) scale(1.05);
    box-shadow: 0 12px 40px -8px color-mix(in srgb, var(--accent) 60%, transparent);
  }
  .btn.active::before { opacity: 1; }

  [data-theme="light"] .btn.active.cheap  { color: #1a1000; }
  [data-theme="light"] .btn.active.fast   { color: #001a22; }
  [data-theme="light"] .btn.active.quality{ color: #1a0010; }

  @keyframes slide-down {
    from { opacity: 0; transform: translateY(-32px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slide-up {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .animate-down {
    opacity: 0;
    animation: slide-down 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  .animate-up {
    opacity: 0;
    animation: slide-up 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  /* Theme toggle slides in from top */
  .theme-toggle {
    opacity: 0;
    animation: slide-down 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
  }

  @keyframes bump-out {
    0%   { transform: translateY(-4px) scale(1.05); }
    30%  { transform: translateY(2px) scale(0.94); }
    65%  { transform: translateY(-1px) scale(1.01); }
    100% { transform: translateY(0) scale(1); }
  }
  .btn.deselecting { animation: bump-out 0.38s ease forwards; }

  .result {
    min-height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--surface-border);
    border-radius: 8px;
    padding: 1.2rem 2rem;
    max-width: 420px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.4s ease, transform 0.4s ease,
                background 0.4s ease, border-color 0.4s ease;
  }
  .result-card.show { opacity: 1; transform: translateY(0); }

  .result-card .label {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
    transition: color 0.4s ease;
  }
  .result-card .message {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.05em;
    line-height: 1.3;
    color: var(--text);
    transition: color 0.4s ease;
  }
  .result-card .trade {
    font-size: 0.75rem;
    color: var(--subtext);
    margin-top: 0.5rem;
    font-weight: 300;
    transition: color 0.4s ease;
  }
</style>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pick Two">
<meta name="theme-color" content="#1c2128">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="apple-touch-icon" sizes="167x167" href="icon-167.png">
<link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
<link rel="apple-touch-icon" sizes="120x120" href="icon-120.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="manifest" href="manifest.json">
</head>
<body>

<div class="bg-glow" id="bg-glow"></div>

<!-- Theme toggle -->
<div class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
  <!-- Moon icon -->
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
  <div class="track"><div class="knob"></div></div>
  <!-- Sun icon -->
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42M12 7a5 5 0 1 0 0 10A5 5 0 0 0 12 7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
</div>

<div class="container">
  <p class="eyebrow animate-down" style="animation-delay:0.15s">The Iron Triangle</p>
  <h1 class="animate-down" style="animation-delay:0.28s">Pick<br>Two</h1>
  <p class="subtitle animate-down" style="animation-delay:0.42s">You can't have it all. Nobody can brosauce.</p>

  <div class="buttons animate-up" style="animation-delay:0.38s">
    <button class="btn cheap"   data-id="cheap"   onclick="toggle(this)"><span>Cheap</span></button>
    <button class="btn fast"    data-id="fast"    onclick="toggle(this)"><span>Fast</span></button>
    <button class="btn quality" data-id="quality" onclick="toggle(this)"><span>Quality</span></button>
  </div>

  <div class="result animate-up" style="animation-delay:0.52s">
    <div class="result-card" id="result-card">
      <div class="label">The consequence</div>
      <div class="message" id="result-msg"></div>
      <div class="trade" id="result-trade"></div>
    </div>
  </div>
</div>

<script>
  const messages = {
    'cheap+fast':    { msg: 'Cheap & Fast',    trade: "It won't be good." },
    'cheap+quality': { msg: 'Cheap & Quality', trade: "It won't be fast." },
    'fast+quality':  { msg: 'Fast & Quality',  trade: "It won't be cheap." },
  };

  const blobColors = { cheap: '#f5c500', fast: '#00c8ff', quality: '#ff0066' };

  let selected = new Set();

  function toggleTheme() {
    const html = document.documentElement;
    html.dataset.theme = html.dataset.theme === 'dark' ? 'light' : 'dark';
  }

  function toggle(btn) {
    const id = btn.dataset.id;

    if (btn.classList.contains('active')) {
      selected.delete(id);
      btn.classList.remove('active');
    } else {
      if (selected.size === 2) {
        const others = [...selected];
        const evictId = others[Math.floor(Math.random() * others.length)];
        const evictBtn = document.querySelector(`.btn[data-id="${evictId}"]`);
        selected.delete(evictId);
        evictBtn.classList.remove('active');
        evictBtn.classList.add('deselecting');
        evictBtn.addEventListener('animationend', () => evictBtn.classList.remove('deselecting'), { once: true });
      }
      selected.add(id);
      btn.classList.add('active');
    }

    updateUI();
  }

  function updateUI() {
    const card = document.getElementById('result-card');
    if (selected.size === 2) {
      const key = [...selected].sort().join('+');
      const data = messages[key];
      document.getElementById('result-msg').textContent = data.msg;
      document.getElementById('result-trade').textContent = data.trade;
      card.classList.add('show');
    } else {
      card.classList.remove('show');
    }

    const arr = [...selected];
    const glow = document.getElementById('bg-glow');
    if (arr.length === 2) {
      const c1 = blobColors[arr[0]];
      const c2 = blobColors[arr[1]];
      glow.style.background = `radial-gradient(ellipse at top left, ${c1} 0%, transparent 55%), radial-gradient(ellipse at bottom right, ${c2} 0%, transparent 55%)`;
      glow.classList.add('visible');
    } else if (arr.length === 1) {
      const c1 = blobColors[arr[0]];
      glow.style.background = `radial-gradient(ellipse at top left, ${c1} 0%, transparent 55%)`;
      glow.classList.add('visible');
    } else {
      glow.classList.remove('visible');
    }
  }
</script>
</body>
</html>
